limit_req_zone $binary_remote_addr zone=seromod_api:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=seromod_conn:10m;

server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # Replace these with your real certificate paths.
    ssl_certificate /etc/letsencrypt/live/example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:seromod_ssl:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    root /opt/seromod/seromod/dashboard/dist;
    index index.html;

    client_max_body_size 16k;

    location /api/ {
        limit_req zone=seromod_api burst=10 nodelay;
        limit_conn seromod_conn 20;

        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
    }

    location / {
        try_files $uri /index.html;
    }
}
